<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ZEISS Lens Navigator Stable 7</title>
<style>
:root{
  --bg:#F7F9FC; --card:#fff; --ink:#071b52; --text:#111827;
  --muted:#6b7280; --line:#e5e7eb; --blue:#0b2a66; --ios:#1266d6;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text)}
.app{max-width:980px;margin:0 auto;min-height:100vh;padding:24px 34px 40px}
.nav{display:grid;grid-template-columns:120px 1fr 120px;align-items:center;margin-bottom:30px}
.nav-compact{display:block;margin-bottom:12px}
.back{color:var(--ios);font-size:22px;cursor:pointer;user-select:none}
.title{text-align:center;color:var(--ink);font-weight:750;font-size:30px}
.product-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:28px 34px;margin-bottom:14px;display:grid;grid-template-columns:1fr 42px;gap:20px;align-items:center;cursor:pointer;min-height:126px}
.product-name{color:var(--ink);font-size:34px;font-weight:760;line-height:1.12}
.from{color:var(--muted);font-size:20px;margin-top:22px;line-height:1.25}
.tagline{color:var(--muted);font-size:17px;margin-top:10px;line-height:1.25}.home-subtitle{color:var(--muted);font-size:18px;margin-top:12px;line-height:1.25}
.hero-home-header{display:none}
.zeiss-logo-mark{background:#0047a0;color:white;font-family:Georgia,serif;font-weight:900;font-size:28px;letter-spacing:.02em;line-height:1;padding:14px 16px 20px;border-radius:1px;position:relative;box-shadow:0 6px 18px rgba(0,50,120,.16)}
.zeiss-logo-mark::after{content:"";position:absolute;left:0;right:0;bottom:0;height:12px;background:white;border-radius:0 0 50% 50%}
.home-title-main{color:var(--ink);font-size:30px;font-weight:750;margin-top:12px;letter-spacing:-.4px}
.home-hero-list{display:flex;flex-direction:column;gap:34px;margin-top:6px;padding:4px 0 18px}
.main-hero{}
.sub-hero{}
.hero-card{position:relative;height:0;padding-bottom:36%;border-radius:24px;overflow:hidden;cursor:pointer;background:#fff;box-shadow:0 8px 24px rgba(0,0,0,.06);transition:transform .18s ease, box-shadow .18s ease, opacity .18s ease}
.hero-card:hover{transform:scale(1.005);box-shadow:0 12px 30px rgba(0,0,0,.08)}
.hero-card:active{transform:scale(1.015);box-shadow:0 14px 36px rgba(0,0,0,.10)}
.hero-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.series-hero-banner{position:relative;height:190px;border-radius:20px;overflow:hidden;margin:0 0 18px;background:#dbe5ef;box-shadow:0 8px 24px rgba(0,0,0,.06)}
.series-hero-banner img{width:100%;height:100%;object-fit:cover;display:block}
.screen-shell{animation:screenFade .22s ease both}
@keyframes screenFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.chev{color:#7b8190;font-size:48px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:28px 34px;margin-bottom:14px}
.product-head{display:flex;align-items:center;gap:12px}
.product-head h1{margin:0;color:var(--ink);font-size:38px;line-height:1.12}
.info{color:#9ca3af;font-size:20px;cursor:pointer}
.total{margin-top:24px}
.label{color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-size:14px;font-weight:750}
.note{color:var(--muted);font-size:16px;margin:6px 0 10px;line-height:1.3}
.amount{color:var(--ink);font-size:32px;font-weight:800;margin-top:6px}
.row{display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:10px;padding:14px 10px;border-bottom:1px solid #f0f1f3;cursor:pointer;border-radius:12px;transition:background .18s ease, transform .18s ease}
.row:hover{background:#f8fbff}
.row.selected{background:#f2f7ff}
.row.selected .row-name{color:var(--ink);font-weight:650}
.row:last-child{border-bottom:0}
.mark{color:var(--blue);font-size:27px;font-weight:800;width:32px;text-align:center}
.empty{border:2px solid #a3a8b3;width:22px;height:22px;border-radius:50%;margin-left:4px}
.box{border-radius:5px}
.row-name{font-size:21px}
.row-sub{font-size:16px;color:var(--muted);margin-top:4px;line-height:1.25}
.row-price{font-size:19px;color:var(--muted);white-space:nowrap}

.photo-colour-picker{
  grid-column:1 / -1;
  display:flex;
  gap:24px;
  align-items:center;
  padding:14px 14px 18px 58px;
  border-bottom:1px solid #f0f1f3;
  background:#fbfdff;
}
.photo-colour-chip{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:7px;
  font-size:14px;
  color:var(--muted);
  cursor:pointer;
}
.photo-dot{
  width:42px;
  height:42px;
  border-radius:50%;
  border:2px solid rgba(17,24,39,.25);
  box-shadow:inset 0 1px 4px rgba(0,0,0,.25);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:800;
}
.photo-colour-chip.selected .photo-dot{
  outline:3px solid var(--blue);
  outline-offset:3px;
}
.photo-colour-chip.selected{
  color:var(--blue);
  font-weight:700;
}

.benefit{font-size:20px;color:#374151;padding:9px 0}
.why-stage{width:100%;height:260px;border:1px solid #f0f1f3;border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:center;color:#9ca3af;font-size:18px;margin:8px 0 20px;text-align:center;overflow:hidden}.why-stage img{max-width:100%;max-height:100%;object-fit:contain;display:block}
.actions{display:flex;justify-content:flex-end;margin-top:18px;gap:12px}
.btn{border:0;background:var(--blue);color:white;font-size:18px;font-weight:700;border-radius:14px;padding:15px 26px;cursor:pointer}
.summary-title{color:var(--ink);font-size:34px;font-weight:750;margin-bottom:24px}
.summary-line{display:flex;justify-content:space-between;gap:20px;border-top:1px solid var(--line);padding:16px 0;font-size:20px}
.summary-options-group{align-items:flex-start}
.summary-options-inner{width:100%}
.summary-option-row{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;margin-top:10px;font-weight:400;cursor:pointer}
.summary-option-row span:first-child{font-weight:400}
.summary-option-row span:last-child{white-space:nowrap;text-align:right}

/* RC24.4 summary alignment: prices align with selected value line (not category label) */
.summary-value-price{
  padding-top:24px;
  text-align:right;
  white-space:nowrap;
}
.summary-options-group{align-items:flex-start;}
.summary-option-row{
  grid-template-columns:minmax(0,1fr) auto;
  align-items:start;
  min-height:44px;
}
.summary-option-price{
  text-align:right;
  white-space:nowrap;
}
.summary-option-row .complimentary-price-stack{
  align-items:flex-end;
  min-height:38px;
}
.summary-option-row .complimentary-pill{
  align-self:flex-end;
}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.18);align-items:center;justify-content:center;padding:30px}
.overlay.show{display:flex}
.range-icon{color:#9ca3af;font-size:20px;margin-left:8px;cursor:pointer;vertical-align:middle}
.range-popup{background:white;border-radius:18px;width:min(820px,92vw);max-height:88vh;overflow:auto;padding:28px}
.range-popup-title{color:var(--ink);font-size:26px;font-weight:750;margin-bottom:18px;text-align:center}
.range-placeholder{border:1px dashed #c7cbd1;border-radius:14px;padding:38px;color:#6b7280;text-align:center;font-size:20px;line-height:1.45}
.range-close{color:var(--ios);font-size:20px;text-align:center;margin-top:18px;cursor:pointer}

.compare-check{display:inline-flex;align-items:center;gap:10px;margin-top:18px;color:var(--muted);font-size:18px}
.compare-check .empty,.compare-check .mark{transform:scale(.82);margin:0}
.compare-bar{position:sticky;bottom:12px;background:white;border:1px solid var(--line);border-radius:18px;padding:16px 20px;margin-top:18px;box-shadow:0 8px 24px rgba(0,0,0,.08);display:flex;justify-content:space-between;gap:16px;align-items:center}
.compare-bar-title{color:var(--ink);font-size:18px;font-weight:750}
.compare-bar-sub{color:var(--muted);font-size:15px;margin-top:4px}
.category-hidden-note{color:var(--muted);font-size:16px;margin:0 0 16px;text-align:center}
.compare-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.compare-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px}
.compare-name{color:var(--ink);font-size:20px;font-weight:760;line-height:1.18;min-height:70px}
.compare-tag{color:var(--muted);font-size:15px;margin:8px 0 12px;line-height:1.25;min-height:38px;display:flex;align-items:flex-start}
.compare-image-stage{width:100%;height:180px;display:flex;align-items:center;justify-content:center;border:1px solid #f0f1f3;border-radius:14px;overflow:hidden;background:#fff}
.compare-image-stage img{max-width:100%;max-height:100%;object-fit:contain;display:block}
.compare-price{font-size:18px;font-weight:750;color:var(--ink);margin-top:12px}
.compare-bullet{font-size:15px;color:#374151;line-height:1.35;margin:8px 0;display:grid;grid-template-columns:14px 1fr;column-gap:6px}.compare-bullet::before{content:'•';grid-column:1}.compare-bullet span{grid-column:2}
.compare-section-title{height:28px;display:flex;align-items:flex-end;margin-top:14px;margin-bottom:8px;font-size:14px;font-weight:750;letter-spacing:.08em;text-transform:uppercase;color:#6b7280}.compare-why-body,.compare-req-body{display:block}
@media(max-width:900px){.compare-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.compare-grid{grid-template-columns:1fr}}

@media(max-width:760px){
  .app{padding:18px 18px 30px}.nav{grid-template-columns:90px 1fr 90px}.title{font-size:25px}.series-hero-banner{height:130px}.home-title-main{font-size:26px}.zeiss-logo-mark{font-size:24px}
  .product-card{padding:24px;min-height:120px}.product-name{font-size:28px}.from{font-size:18px}
  .product-head h1{font-size:31px}.row-name{font-size:18px}.row-price{font-size:17px}
}

.series-switcher{
position:fixed;
left:50%;
transform:translateX(-50%);
bottom:18px;
display:flex;
gap:10px;
background:rgba(255,255,255,.95);
backdrop-filter:blur(12px);
padding:8px;
border:1px solid #e5e7eb;
border-radius:18px;
box-shadow:0 8px 24px rgba(0,0,0,.12);
z-index:9999;
}
.series-btn{
padding:10px 18px;
border-radius:12px;
border:none;
font-size:15px;
font-weight:700;
cursor:pointer;
background:#eef2f7;
color:#334155;
}
.series-btn.active{
background:#0b2d5c;
color:white;
}


/* Stable 7.5.4 RC3 — price-only sticky footer */
.app.has-sticky-price{
  padding-bottom:140px;
}
.sticky-price-footer{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:max(14px, env(safe-area-inset-bottom));
  width:min(920px, calc(100vw - 24px));
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px 20px;
  box-shadow:0 8px 24px rgba(0,0,0,.10);
  text-align:center;
  color:var(--ink);
  font-size:22px;
  font-weight:850;
  z-index:10000;
  cursor:pointer;
  user-select:none;
}
.sticky-price-footer:active{
  transform:translateX(-50%) scale(.992);
}
.why-rec-title{color:var(--ink);font-size:28px;font-weight:800;margin-bottom:18px}
.why-rec-series{color:var(--ink);font-size:22px;font-weight:800;margin-bottom:8px}
.why-rec-copy{color:#374151;font-size:18px;line-height:1.45;margin-bottom:22px}
.why-enhance-title{color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-size:13px;font-weight:800;margin:8px 0 10px}
.why-rec-item{border-top:1px solid var(--line);padding:16px 0}
.why-rec-item-title{color:var(--ink);font-size:19px;font-weight:800;margin-bottom:6px}
.why-rec-item-copy{color:#374151;font-size:17px;line-height:1.42}


/* Stable 7.6 — ZEISS catalogue-inspired selected state */
.row.selected{
  background:#eef6ff;
  border:1.5px solid #1266d6;
  box-shadow:0 4px 14px rgba(18,102,214,.08);
}
.row.selected .row-name{
  color:#0047a0;
  font-weight:760;
}
.row.selected .row-sub{
  color:#335f95;
}
.row.selected .row-price{
  color:#0047a0;
  font-weight:760;
}
.row.selected .mark{
  color:#0047a0;
}
.compare-check .mark{
  color:#0047a0;
}


/* Stable fallback — centered aperture price replacement (no particles; no layout shift) */
.price-aperture-wrap{
  position:relative;
  display:inline-block;
  min-width:160px;
  height:1.25em;
  line-height:1.25em;
  vertical-align:middle;
  overflow:hidden;
  text-align:center;
}
.price-aperture-text{
  display:block;
  white-space:nowrap;
  clip-path:inset(0 0 0 0);
  will-change:clip-path, opacity, filter;
}
.price-aperture-text.aperture-out{
  animation:apertureOut .34s cubic-bezier(.22,.61,.36,1) forwards;
}
.price-aperture-text.aperture-in{
  animation:apertureIn .36s cubic-bezier(.22,.61,.36,1) forwards;
}
@keyframes apertureOut{
  0%{clip-path:inset(0 0 0 0);opacity:1;filter:blur(0)}
  55%{clip-path:inset(0 18% 0 18%);opacity:.75;filter:blur(.2px)}
  100%{clip-path:inset(0 50% 0 50%);opacity:0;filter:blur(.7px)}
}
@keyframes apertureIn{
  0%{clip-path:inset(0 50% 0 50%);opacity:0;filter:blur(.7px)}
  45%{clip-path:inset(0 20% 0 20%);opacity:.72;filter:blur(.2px)}
  100%{clip-path:inset(0 0 0 0);opacity:1;filter:blur(0)}
}


/* Stable 8.1 - Summary ZEISS styling */
.summary-title{
  color:#0047A0 !important;
  text-transform:uppercase;
  letter-spacing:.08em;
  font-size:18px !important;
  font-weight:800;
  margin-bottom:10px !important;
}
.summary-zeiss-logo{
  text-align:center;
  margin:8px 0 22px;
}
.summary-zeiss-logo img{
  height:34px;
  width:auto;
}
.why-enhance-title{
  color:#0047A0 !important;
}
.why-rec-item-title{
  color:#0047A0 !important;
}
.why-rec-item{
  border-top:1px solid #d8e7fb !important;
}


.summary-header{
  position:relative;
}
.summary-zeiss-corner{
  position:absolute;
  top:18px;
  right:22px;
  z-index:1;
}
.summary-zeiss-corner img{
  width:38px;
  height:auto;
}


/* Stable 8.2 trial - ZEISS accent on main detail product card only */
.detail-title-panel{
  position:relative;
  border-left:6px solid #0047A0 !important;
  padding-right:92px !important;
}
.detail-title-panel .detail-zeiss-logo{
  position:absolute;
  top:18px;
  right:22px;
}
.detail-title-panel .detail-zeiss-logo img{
  width:38px;
  height:auto;
  display:block;
}




/* Stable 10 - Clean PDF.js Insert viewer */
.pdf-insert{
  display:none;
  position:fixed;
  inset:0;
  background:#f7f9fc;
  z-index:20000;
  flex-direction:column;
}
.pdf-insert.show{
  display:flex;
}
.pdf-insert-bar{
  height:58px;
  flex:0 0 58px;
  display:grid;
  grid-template-columns:110px 1fr 110px;
  align-items:center;
  border-bottom:1px solid var(--line);
  padding:0 18px;
  background:#fff;
}
.pdf-insert-close{
  color:var(--ios);
  font-size:21px;
  font-weight:650;
  cursor:pointer;
  user-select:none;
}
.pdf-insert-title{
  text-align:center;
  color:var(--ink);
  font-size:18px;
  font-weight:800;
  letter-spacing:.02em;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.pdf-insert-viewer{
  flex:1;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
  padding:24px 18px 42px;
  background:#f7f9fc;
  touch-action:pan-y;
  overscroll-behavior:contain;
}
.pdf-page-canvas{
  display:block;
  margin:0 auto 22px;
  background:#fff;
  box-shadow:0 10px 28px rgba(0,0,0,.14);
  max-width:100%;
  height:auto;
}
.pdf-page-canvas:last-child{
  margin-bottom:0;
}
.pdf-page-image{display:block;width:min(980px,calc(100% - 36px));height:auto;margin:0 auto 18px;background:#fff;border-radius:4px;box-shadow:0 1px 4px rgba(17,24,39,.12);user-select:none;-webkit-user-select:none;-webkit-user-drag:none;touch-action:pan-y;}
.pdf-insert-loading{
  color:#6b7280;
  text-align:center;
  font-size:18px;
  padding:38px 20px;
}


/* Stable 10.2 - Comfort Stars */
.comfort-stars{
  margin-top:6px;
  margin-bottom:8px;
  color:#1f5fbf;
  font-size:13px;
  letter-spacing:2px;
  font-weight:650;
  line-height:1;
}
.compare-stars{
  margin-top:6px;
  margin-bottom:8px;
  color:#1f5fbf;
  font-size:13px;
  letter-spacing:2px;
  font-weight:650;
  line-height:1;
}
.detail-stars{
  margin-top:8px;
  color:#1f5fbf;
  font-size:14px;
  letter-spacing:2px;
  font-weight:650;
  line-height:1;
}
.summary-stars{
  margin-top:7px;
  color:#1f5fbf;
  font-size:16px;
  letter-spacing:2px;
  font-weight:650;
  line-height:1;
}


/* Stable 11 trial - calm local option updates */
.row{
  transition:background-color .18s ease, border-color .18s ease, box-shadow .18s ease;
}
.row .mark,
.row .empty{
  transition:background-color .16s ease, border-color .16s ease, color .16s ease;
}
.row-price{
  transition:opacity .16s ease;
}
.row-price.updating{
  opacity:.45;
}


/* Stable 11.3 - hidden PRO explanation popover */
.pro-popover{
  display:none;
  position:absolute;
  top:calc(100% + 20px);
  left:58%;
  transform:translateX(-50%);
  width:430px;
  max-width:80vw;
  z-index:50;
  background:#fff;
  border:1px solid #d8dde8;
  border-radius:14px;
  box-shadow:0 14px 36px rgba(15,23,42,.18);
  padding:20px 22px 20px 96px;
  color:var(--ink);
  font-size:17px;
  line-height:1.42;
  letter-spacing:0;
  text-align:left;
  white-space:normal;
}
.pro-popover.show{
  display:block;
}
.pro-popover:before{
  content:"";
  position:absolute;
  top:-13px;
  left:50%;
  transform:translateX(-50%) rotate(45deg);
  width:24px;
  height:24px;
  background:#fff;
  border-left:1px solid #d8dde8;
  border-top:1px solid #d8dde8;
}
.pro-popover-icon{
  position:absolute;
  left:22px;
  top:24px;
  width:54px;
  height:54px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.pro-popover-icon svg{
  width:54px;
  height:54px;
  display:block;
}
.pro-popover-title{
  color:#0047A0;
  font-size:20px;
  font-weight:800;
  margin-bottom:16px;
}
.pro-popover-close{
  position:absolute;
  top:13px;
  right:16px;
  color:#7d8491;
  font-size:26px;
  font-weight:300;
  cursor:pointer;
}
.pro-popover-copy{
  color:#0b1b4f;
  font-size:16px;
  font-weight:500;
  line-height:1.48;
  display:block;
  padding-top:14px;
}

.pro-popover-more{
  margin-top:18px;
  color:#0047A0;
  font-size:15px;
  font-weight:800;
  line-height:1;
  display:inline-flex;
  align-items:center;
  cursor:pointer;
  user-select:none;
}
.pro-popover-more:hover{
  text-decoration:underline;
}



/* Stable 11.7 - i.Profiler fixed-position reveal */
.pro-word,
.iscription-word,
.singlevision-word{
  position:relative;
  display:inline-block;
  cursor:pointer;
  color:inherit;
  text-shadow:none;
}

.singlevision-word:hover{
  text-shadow:0 0 10px rgba(0,91,211,.24);
}
.iprofiler-reveal-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:40000;
}
.iprofiler-halo{
  position:fixed;
  width:18px;
  height:18px;
  border-radius:999px;
  transform:translate(-50%,-50%);
  pointer-events:none;
}
.iprofiler-halo::before,
.iprofiler-halo::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:999px;
  border:2px solid rgba(0,91,211,.38);
  box-shadow:0 0 22px rgba(0,91,211,.28), inset 0 0 14px rgba(0,91,211,.14);

}

}
.iprofiler-core{
  position:absolute;
  left:50%;
  top:50%;
  width:12px;
  height:12px;
  transform:translate(-50%,-50%);
  border-radius:999px;
  background:rgba(0,91,211,.26);

  animation:iprofilerCoreGlow 2s ease-out forwards;
}
@keyframes iprofilerRevealRing{

  10%{opacity:1;}
  72%{opacity:.45;}
  100%{opacity:0; transform:scale(8.5);}
}

  14%{opacity:1; transform:translate(-50%,-50%) scale(1);}
  100%{opacity:0; transform:translate(-50%,-50%) scale(2.4);}
}

}

function dataUriToUint8Array(dataUri){
  const base64 = dataUri.split(",")[1];
  const binary = atob(base64);
  const len = binary.length;
  const bytes = new Uint8Array(len);
  for(let i=0;i<len;i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

  const token = ++currentPdfRenderToken;
  const countText = collectionMeta ? `<span class="pdf-count">${collectionMeta.index + 1} / ${collectionMeta.total}</span>` : "";
  titleEl.innerHTML = `${title || "PDF Insert"}${countText}`;
  pagesEl.innerHTML = `<div class="pdf-insert-loading">Loading ZEISS information...</div>`;
  if(viewer){
    viewer.scrollTop = 0;
    viewer.classList.toggle("collection-mode", !!collectionMeta);
  }
  overlay.classList.add("show");

  if(navEl){
    if(collectionMeta && collectionMeta.total > 1){
      navEl.innerHTML = `
        <div class="pdf-nav-btn ${collectionMeta.index === 0 ? "disabled" : ""}" onclick="switchPdfCollection(-1)">‹</div>
        <div class="pdf-nav-btn ${collectionMeta.index === collectionMeta.total - 1 ? "disabled" : ""}" onclick="switchPdfCollection(1)">›</div>
      `;
    } else {
      navEl.innerHTML = "";
    }
  }

  if(typeof PDF_PAGE_IMAGE_MAP !== "undefined" && PDF_PAGE_IMAGE_MAP[pdfDataUri]){
    currentPdfImageTitle = title || "ZEISS information";
    currentPdfImagePages = PDF_PAGE_IMAGE_MAP[pdfDataUri].slice();
    currentPdfImagePageIndex = 0;
    renderPdfImagePage();
    updatePdfImageNav();
    return;
  }

  if(!window.pdfjsLib){
    pagesEl.innerHTML = `<div class="pdf-insert-loading">PDF renderer could not load. Please check internet connection.</div>`;
    return;
  }

  pdfjsLib.GlobalWorkerOptions.workerSrc = "";
  const pdf = await pdfjsLib.getDocument({data:dataUriToUint8Array(pdfDataUri), disableWorker:true}).promise;
  if(token !== currentPdfRenderToken) return;

  pagesEl.innerHTML = "";
  for(let pageNo=1; pageNo<=pdf.numPages; pageNo++){
    const page = await pdf.getPage(pageNo);
    if(token !== currentPdfRenderToken) return;

    const unscaled = page.getViewport({scale:1});
    const viewerWidth = Math.min((viewer ? viewer.clientWidth : window.innerWidth) - 36, 980);
    const cssScale = viewerWidth / unscaled.width;
    const outputScale = Math.max(window.devicePixelRatio || 1, 2);
    const viewport = page.getViewport({scale:cssScale * outputScale});

    const canvas = document.createElement("canvas");
    canvas.className = "pdf-page-canvas";
    canvas.width = Math.floor(viewport.width);
    canvas.height = Math.floor(viewport.height);
    canvas.style.width = Math.floor(viewport.width / outputScale) + "px";
    canvas.style.height = Math.floor(viewport.height / outputScale) + "px";
    pagesEl.appendChild(canvas);

    const ctx = canvas.getContext("2d", {alpha:false});
    await page.render({canvasContext:ctx, viewport}).promise;
  }
}

function closePdfInsert(){
  clearConsultationScribbles();
  currentPdfRenderToken++;
  currentPdfCollection = null;
  currentPdfCollectionIndex = 0;
  currentPdfImagePages = [];
  currentPdfImagePageIndex = 0;
  currentPdfImageTitle = "";
  pdfSwipeState = null;
  const overlay = document.getElementById("pdfInsert");
  const pagesEl = document.getElementById("pdfInsertPages");
  const navEl = document.getElementById("pdfInsertNav");
  const viewer = document.getElementById("pdfInsertViewer");
  if(overlay) overlay.classList.remove("show");
  if(pagesEl) pagesEl.innerHTML = "";
  if(navEl) navEl.innerHTML = "";
  if(viewer) viewer.classList.remove("collection-mode");
}

function renderPdfImagePage(){
  const pagesEl = document.getElementById("pdfInsertPages");
  const viewer = document.getElementById("pdfInsertViewer");
  if(!pagesEl || !currentPdfImagePages || !currentPdfImagePages.length) return;
  const src = currentPdfImagePages[currentPdfImagePageIndex];
  pagesEl.innerHTML = "";
  const img = document.createElement("img");
  img.className = "pdf-page-image";
  img.src = src;
  img.alt = `${currentPdfImageTitle || "ZEISS information"} page ${currentPdfImagePageIndex + 1}`;
  pagesEl.appendChild(img);
  if(viewer) viewer.scrollTop = 0;
}

function updatePdfImageNav(){
  const navEl = document.getElementById("pdfInsertNav");
  const titleEl = document.getElementById("pdfInsertTitle");
  if(!navEl) return;

  if(currentPdfCollection && currentPdfCollection.length > 1){
    navEl.innerHTML = `
      <div class="pdf-nav-btn ${currentPdfCollectionIndex === 0 ? "disabled" : ""}" onclick="switchPdfCollection(-1)">‹</div>
      <div class="pdf-nav-btn ${currentPdfCollectionIndex === currentPdfCollection.length - 1 ? "disabled" : ""}" onclick="switchPdfCollection(1)">›</div>
    `;
    return;
  }

  if(currentPdfImagePages && currentPdfImagePages.length > 1){
    navEl.innerHTML = `
      <div class="pdf-nav-btn ${currentPdfImagePageIndex === 0 ? "disabled" : ""}" onclick="switchPdfImagePage(-1)">‹</div>
      <div class="pdf-nav-btn ${currentPdfImagePageIndex === currentPdfImagePages.length - 1 ? "disabled" : ""}" onclick="switchPdfImagePage(1)">›</div>
    `;
    if(titleEl){
      const base = currentPdfImageTitle || "ZEISS information";
      titleEl.innerHTML = `${base}<span class="pdf-count">${currentPdfImagePageIndex + 1} / ${currentPdfImagePages.length}</span>`;
    }
  } else {
    navEl.innerHTML = "";
  }
}

function switchPdfImagePage(direction){
  if(!currentPdfImagePages || currentPdfImagePages.length < 2) return;
  const next = currentPdfImagePageIndex + direction;
  if(next < 0 || next >= currentPdfImagePages.length) return;
  currentPdfImagePageIndex = next;
  renderPdfImagePage();
  updatePdfImageNav();
}

function openPdfCollection(collection){
  if(!collection || !collection.length) return;
  currentPdfCollection = collection;
  currentPdfCollectionIndex = 0;
  renderCurrentPdfCollectionItem();
}

function renderCurrentPdfCollectionItem(){
  if(!currentPdfCollection || !currentPdfCollection.length) return;
  const item = currentPdfCollection[currentPdfCollectionIndex];
  openPdfInsert(item.title, item.pdf, {
    index: currentPdfCollectionIndex,
    total: currentPdfCollection.length
  });
}

function switchPdfCollection(direction){
  if(!currentPdfCollection || currentPdfCollection.length < 2) return;
  const next = currentPdfCollectionIndex + direction;
  if(next < 0 || next >= currentPdfCollection.length) return;
  currentPdfCollectionIndex = next;
  renderCurrentPdfCollectionItem();
}

function setupPdfCollectionSwipe(){
  const viewer = document.getElementById("pdfInsertViewer");
  if(!viewer || viewer.__collectionSwipeReady) return;
  viewer.__collectionSwipeReady = true;

  let swipeStart = null;
  let wheelLock = false;

  function hasActivePdfOverlay(){
    const overlay = document.getElementById("pdfInsert");
    return overlay && overlay.classList.contains("show");
  }

  function canSwipePdf(){
    return hasActivePdfOverlay() && (
      (currentPdfCollection && currentPdfCollection.length > 1) ||
      (currentPdfImagePages && currentPdfImagePages.length > 1)
    );
  }

  function doPdfSwipe(direction){
    // direction: 1 = next, -1 = previous
    if(currentPdfCollection && currentPdfCollection.length > 1){
      switchPdfCollection(direction);
      return;
    }
    if(currentPdfImagePages && currentPdfImagePages.length > 1){
      switchPdfImagePage(direction);
    }
  }

  function startSwipe(x,y){
    if(!canSwipePdf()) return;
    swipeStart = {x:x, y:y};
  }

  function finishSwipe(x,y,event){
    if(!swipeStart || !canSwipePdf()) return;
    const dx = x - swipeStart.x;
    const dy = y - swipeStart.y;
    swipeStart = null;

    // Purposeful horizontal swipe only.
    if(Math.abs(dx) < 45 || Math.abs(dx) <= Math.abs(dy) * 1.15) return;
    if(event && event.cancelable) event.preventDefault();
    doPdfSwipe(dx < 0 ? 1 : -1);
  }

  viewer.addEventListener("pointerdown", function(event){
    if(event.pointerType === "pen") return;
    startSwipe(event.clientX, event.clientY);
  }, {passive:true});

  viewer.addEventListener("pointerup", function(event){
    finishSwipe(event.clientX, event.clientY, event);
  }, {passive:false});

  viewer.addEventListener("touchstart", function(event){
    if(!event.touches || event.touches.length !== 1) return;
    startSwipe(event.touches[0].clientX, event.touches[0].clientY);
  }, {passive:true});

  viewer.addEventListener("touchend", function(event){
    if(!event.changedTouches || event.changedTouches.length !== 1) return;
    finishSwipe(event.changedTouches[0].clientX, event.changedTouches[0].clientY, event);
  }, {passive:false});

  viewer.addEventListener("mousedown", function(event){
    startSwipe(event.clientX, event.clientY);
  }, {passive:true});

  viewer.addEventListener("mouseup", function(event){
    finishSwipe(event.clientX, event.clientY, event);
  }, {passive:false});

  // Mac trackpad horizontal swipe support.
  viewer.addEventListener("wheel", function(event){
    if(!canSwipePdf()) return;
    if(Math.abs(event.deltaX) < 35 || Math.abs(event.deltaX) <= Math.abs(event.deltaY) * 1.2) return;
    if(wheelLock) return;
    wheelLock = true;
    event.preventDefault();
    doPdfSwipe(event.deltaX > 0 ? 1 : -1);
    setTimeout(() => { wheelLock = false; }, 450);
  }, {passive:false});

  viewer.addEventListener("pointercancel", function(){
    swipeStart = null;
  });
}
setupPdfCollectionSwipe();

/* Apple Pencil / stylus annotation layer
   - Pen tap passes through and selects normally.
   - Pen drag draws simple consultation scribbles.
   - Finger interaction remains normal.
   - Two-finger tap clears all scribbles.
   - Screen/PDF changes call clearConsultationScribbles(). */
const scribbleState = {
  canvas:null,
  ctx:null,
  dpr:1,
  active:false,
  drawing:false,
  pointerId:null,
  startX:0,
  startY:0,
  lastX:0,
  lastY:0,
  moved:false,
  suppressClickUntil:0,
  touchTimes:new Map()
};

function setupConsultationScribbles(){
  const canvas = document.getElementById("consultationScribbleCanvas");
  if(!canvas || canvas.__scribbleReady) return;
  canvas.__scribbleReady = true;
  scribbleState.canvas = canvas;
  scribbleState.ctx = canvas.getContext("2d");
  resizeConsultationScribbleCanvas();
  window.addEventListener("resize", resizeConsultationScribbleCanvas, {passive:true});
  window.addEventListener("orientationchange", () => setTimeout(resizeConsultationScribbleCanvas, 250), {passive:true});

  document.addEventListener("pointerdown", handleScribblePointerDown, true);
  document.addEventListener("pointermove", handleScribblePointerMove, true);
  document.addEventListener("pointerup", handleScribblePointerUp, true);
  document.addEventListener("pointercancel", handleScribblePointerUp, true);
  document.addEventListener("click", handleScribbleClickCapture, true);
  document.addEventListener("touchstart", handleScribbleTouchStart, {capture:true, passive:true});
  document.addEventListener("touchend", handleScribbleTouchEnd, {capture:true, passive:true});
  document.addEventListener("touchcancel", handleScribbleTouchEnd, {capture:true, passive:true});
}

function resizeConsultationScribbleCanvas(){
  const canvas = scribbleState.canvas || document.getElementById("consultationScribbleCanvas");
  if(!canvas) return;
  const old = document.createElement("canvas");
  old.width = canvas.width;
  old.height = canvas.height;
  const oldCtx = old.getContext("2d");
  if(canvas.width && canvas.height) oldCtx.drawImage(canvas,0,0);

  const dpr = Math.max(1, window.devicePixelRatio || 1);
  scribbleState.dpr = dpr;
  canvas.width = Math.round(window.innerWidth * dpr);
  canvas.height = Math.round(window.innerHeight * dpr);
  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = window.innerHeight + "px";
  const ctx = canvas.getContext("2d");
  scribbleState.ctx = ctx;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = "#0b5bd3";
  ctx.lineWidth = 3.2;
  if(old.width && old.height){
    ctx.drawImage(old,0,0,old.width/dpr,old.height/dpr);
  }
}

function clearConsultationScribbles(){
  const canvas = scribbleState.canvas || document.getElementById("consultationScribbleCanvas");
  const ctx = scribbleState.ctx || (canvas ? canvas.getContext("2d") : null);
  if(!canvas || !ctx) return;
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.restore();
  ctx.setTransform(scribbleState.dpr,0,0,scribbleState.dpr,0,0);
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.strokeStyle = "#0b5bd3";
  ctx.lineWidth = 3.2;
}

function isPenPointer(event){
  return event && event.pointerType === "pen";
}

function handleScribblePointerDown(event){
  if(!isPenPointer(event)) return;
  setupConsultationScribbles();
  scribbleState.active = true;
  scribbleState.drawing = false;
  scribbleState.pointerId = event.pointerId;
  scribbleState.startX = event.clientX;
  scribbleState.startY = event.clientY;
  scribbleState.lastX = event.clientX;
  scribbleState.lastY = event.clientY;
  scribbleState.moved = false;
}

function handleScribblePointerMove(event){
  if(!scribbleState.active || event.pointerId !== scribbleState.pointerId || !isPenPointer(event)) return;
  const dx = event.clientX - scribbleState.startX;
  const dy = event.clientY - scribbleState.startY;
  const distance = Math.hypot(dx,dy);
  if(!scribbleState.drawing && distance > 9){
    scribbleState.drawing = true;
    scribbleState.moved = true;
    const ctx = scribbleState.ctx;
    if(ctx){
      ctx.beginPath();
      ctx.moveTo(scribbleState.startX, scribbleState.startY);
    }
  }
  if(scribbleState.drawing){
    const ctx = scribbleState.ctx;
    if(ctx){
      ctx.lineTo(event.clientX, event.clientY);
      ctx.stroke();
    }
    scribbleState.lastX = event.clientX;
    scribbleState.lastY = event.clientY;
    event.preventDefault();
    event.stopPropagation();
  }
}

function handleScribblePointerUp(event){
  if(!scribbleState.active || event.pointerId !== scribbleState.pointerId || !isPenPointer(event)) return;
  if(scribbleState.drawing || scribbleState.moved){
    scribbleState.suppressClickUntil = Date.now() + 450;
    event.preventDefault();
    event.stopPropagation();
  }
  scribbleState.active = false;
  scribbleState.drawing = false;
  scribbleState.pointerId = null;
}

function handleScribbleClickCapture(event){
  if(Date.now() < scribbleState.suppressClickUntil){
    event.preventDefault();
    event.stopPropagation();
    scribbleState.suppressClickUntil = 0;
  }
}

function handleScribbleTouchStart(event){
  const now = Date.now();
  for(const t of Array.from(event.changedTouches || [])){
    scribbleState.touchTimes.set(t.identifier, now);
  }
  if(event.touches && event.touches.length === 2){
    const a = event.touches[0];
    const b = event.touches[1];
    const ta = scribbleState.touchTimes.get(a.identifier) || now;
    const tb = scribbleState.touchTimes.get(b.identifier) || now;
    if(Math.abs(ta - tb) <= 250){
      clearConsultationScribbles();
    }
  }
}

function handleScribbleTouchEnd(event){
  for(const t of Array.from(event.changedTouches || [])){
    scribbleState.touchTimes.delete(t.identifier);
  }
}

let introTapMemory = {series:null, time:0};

  introTapMemory = {series, time:performance.now()};
}

function consumeSlowIntroTap(series, windowMs=1500){
  const now = performance.now();
  const ok = introTapMemory.series === series && (now - introTapMemory.time) <= windowMs;
  introTapMemory = {series:null, time:0};
  return ok;
}

function relaxedSeriesIntroTap(target, series){
  if(!hasSeriesIntro(series)) return false;

  // If the first tap was on the main hero card and the second tap is on the series banner,
  // this works like a relaxed double-click without needing fast timing.
  if(consumeSlowIntroTap(series, 1600)){
    openSeriesIntro(series);
    return true;
  }

  // If already on the series page, two calm taps on the hero banner open the PDF.
  const now = performance.now();
  if(introTapMemory.series === series && (now - introTapMemory.time) <= 1200){
    introTapMemory = {series:null, time:0};
    openSeriesIntro(series);
    return true;
  }

  rememberIntroTap(series);
  return false;
}

function ensureSeriesGestureLayer(){
  let layer = document.getElementById("seriesGestureLayer");
  if(!layer){
    layer = document.createElement("div");
    layer.id = "seriesGestureLayer";
    layer.className = "z-gesture-layer";
    document.body.appendChild(layer);
  }
  return layer;
}

function startSeriesIntroGesture(event, series){
  if(!hasSeriesIntro(series)) return;
  const target = event.currentTarget;
  event.preventDefault();
  event.stopPropagation();
  target.setPointerCapture?.(event.pointerId);

  const layer = ensureSeriesGestureLayer();
  layer.innerHTML = `<svg class="z-gesture-line"><path id="seriesGesturePath" d=""></path></svg>`;

  seriesIntroGesture = {
    series,
    pointerId:event.pointerId,
    startTime:performance.now(),
    points:[{x:event.clientX,y:event.clientY}],
    target
  };

  target.classList.add("z-intro-press");
  clearTimeout(target.__seriesLongPressTimer);
  target.__seriesLongPressTimer = setTimeout(() => {
    if(seriesIntroGesture && seriesIntroGesture.pointerId === event.pointerId && seriesIntroGesture.points.length < 6){
      seriesIntroGesture = null;
      target.__suppressClick = true;
      document.getElementById("seriesGestureLayer")?.remove();
      target.classList.remove("z-intro-press");
      openSeriesIntro(series);
    }
  }, 700);

  updateSeriesGesturePath();
}

function moveSeriesIntroGesture(event){
  if(!seriesIntroGesture || event.pointerId !== seriesIntroGesture.pointerId) return;
  event.preventDefault();
  seriesIntroGesture.points.push({x:event.clientX,y:event.clientY});
  if(seriesIntroGesture.points.length > 100) seriesIntroGesture.points.shift();
  updateSeriesGesturePath();
}

function endSeriesIntroGesture(event){
  if(!seriesIntroGesture || event.pointerId !== seriesIntroGesture.pointerId) return;
  event.preventDefault();

  const points = seriesIntroGesture.points || [];
  const first = points[0] || {x:event.clientX,y:event.clientY};
  const last = points[points.length - 1] || {x:event.clientX,y:event.clientY};
  const dx = last.x - first.x;
  const dy = last.y - first.y;
  const movement = Math.sqrt(dx*dx + dy*dy);
  const elapsed = performance.now() - seriesIntroGesture.startTime;
  const isTap = movement < 14 && elapsed < 900;

  const ok = recogniseSeriesZGesture(points, elapsed);
  const series = seriesIntroGesture.series;
  const target = seriesIntroGesture.target;
  clearTimeout(target?.__seriesLongPressTimer);
  target?.classList.remove("z-intro-press");
  const line = document.querySelector(".z-gesture-line");
  seriesIntroGesture = null;

  if(ok){
    target.__suppressClick = true;
    line?.classList.add("success");
    setTimeout(() => {
      line?.classList.add("fadeout");
      openSeriesIntro(series);
      setTimeout(() => document.getElementById("seriesGestureLayer")?.remove(), 450);
    }, 160);
  } else if(isTap && target?.classList?.contains("hero-card")){
    target.__suppressClick = true;
    line?.classList.add("fadeout");
    setTimeout(() => document.getElementById("seriesGestureLayer")?.remove(), 250);
    if(hasSeriesIntro(series)) rememberIntroTap(series);
    renderCategories(series);
  } else if(isTap && target?.classList?.contains("series-hero-banner")){
    // RC24.14 Hero Isolation: sub-level hero banners are visual only.
    target.__suppressClick = true;
    line?.classList.add("fadeout");
    setTimeout(() => document.getElementById("seriesGestureLayer")?.remove(), 250);
  } else {
    line?.classList.add("fadeout");
    setTimeout(() => document.getElementById("seriesGestureLayer")?.remove(), 400);
  }
}

function cancelSeriesIntroGesture(event){
  if(!seriesIntroGesture) return;
  const target = seriesIntroGesture.target;
  clearTimeout(target?.__seriesLongPressTimer);
  target?.classList.remove("z-intro-press");
  seriesIntroGesture = null;
  const line = document.querySelector(".z-gesture-line");
  line?.classList.add("fadeout");
  setTimeout(() => document.getElementById("seriesGestureLayer")?.remove(), 400);
}

function updateSeriesGesturePath(){
  const path = document.getElementById("seriesGesturePath");
  if(!path || !seriesIntroGesture || seriesIntroGesture.points.length < 2) return;
  const d = seriesIntroGesture.points.map((p,i) => `${i ? "L" : "M"}${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(" ");
  path.setAttribute("d", d);
}

function recogniseSeriesZGesture(points, elapsed){
  if(!points || points.length < 6 || elapsed > 3600) return false;

  const xs = points.map(p => p.x), ys = points.map(p => p.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const width = maxX - minX;
  const height = maxY - minY;
  if(width < 55 || height < 25) return false;

  const n = points.length;
  const a = points[0];
  const b = points[Math.floor(n * .33)];
  const c = points[Math.floor(n * .66)];
  const d = points[n - 1];

  const normal =
    (b.x - a.x > width * .18) &&
    (c.x - b.x < -width * .12) &&
    (c.y - b.y > height * .12) &&
    (d.x - c.x > width * .18);

  if(normal) return true;

  const early = points.slice(0, Math.max(2, Math.floor(n * .40)));
  const mid = points.slice(Math.floor(n * .25), Math.floor(n * .80));
  const late = points.slice(Math.floor(n * .60));

  const earlyRight = Math.max(...early.map(p => p.x)) > minX + width * .62;
  const midLeftLow = mid.some(p => p.x < minX + width * .45 && p.y > minY + height * .40);
  const lateRightLow = late.some(p => p.x > minX + width * .58 && p.y > minY + height * .45);

  if(earlyRight && midLeftLow && lateRightLow) return true;

  // Trackpad fallback: deliberate drag on an intro-enabled hero.
  return width > 80 && height > 35 && elapsed > 180;
}


function buildTypeCode(category){
  if(category === "single") return "SV";
  if(category === "digital") return "DIGI";
  if(category === "progressive") return "PROG";
  if(category === "young") return "YNG";
  return "";
}
function buildSeriesCode(p){
  if(!p) return "";
  if(p.series === "clearmind") return "CMP";
  if(p.series === "smartlife") return "SLP";
  if(p.series === "light") return "L2";
  return (p.series || "").toUpperCase();
}
function buildDesignCode(p, category){
  if(!p) return "";
  const name = (p.name || "").toLowerCase();
  if(category === "young") return "";
  if(name.includes("individual 3")) return "I3";
  if(p.series === "light"){
    if(name.includes("3dv")) return "3DV";
    if(name.includes("3d")) return "3D";
    if(/\b2\s+d\b/.test(name) || /\bd\b/.test(name)) return "D";
  }
  if(name.includes("pure")) return "Pure";
  if(name.includes("plus")) return "Plus";
  if(name.includes("superb")) return "Superb";
  if(p.series === "smartlife" || p.series === "clearmind") return "Superb";
  return "";
}

    nodes.forEach(n => { n.style.height = 'auto'; n.style.minHeight = ''; });
    const max = Math.ceil(Math.max(...nodes.map(n => n.getBoundingClientRect().height)));
    nodes.forEach(n => { n.style.height = max + 'px'; });
  });
  const totalTitles = Array.from(document.querySelectorAll('[data-sync-total-title]'));
  if(totalTitles.length >= 2){
    totalTitles.forEach(n => { n.style.height = 'auto'; n.style.minHeight = ''; });
    const maxTitle = Math.ceil(Math.max(...totalTitles.map(n => n.getBoundingClientRect().height)));
    totalTitles.forEach(n => { n.style.height = maxTitle + 'px'; });
  }
}

function toggleCompare(event, productId, category){
  event.stopPropagation();
  if(compareState.type && compareState.type !== category) return;

  if(compareState.items.includes(productId)){
    compareState.items = compareState.items.filter(id => id !== productId);
    if(compareState.items.length === 0) compareState.type = null;
  } else {
    if(!compareState.type) compareState.type = category;
    compareState.items.push(productId);
  }

  if(state.screen === "categories") renderCategories();
  else if(state.screen === "products") renderProducts(state.category);
}

function startIprofilerBurst(target, done){
  if(!target) return;

  document.querySelectorAll(".pro-popover.show,.iscription-popover.show,.pro-popover.revealing,.iscription-popover.revealing").forEach(p => {
    p.classList.remove("show");
    p.classList.remove("revealing");
  });

  const rect = target.getBoundingClientRect();
  const x = rect.left + rect.width * .58;
  const y = rect.top + rect.height * .52;

  const oldLayer = document.getElementById("iprofilerRevealLayer");
  if(oldLayer) oldLayer.remove();

  const layer = document.createElement("div");
  layer.className = "iprofiler-reveal-layer";
  layer.id = "iprofilerRevealLayer";

  const halo = document.createElement("div");
  halo.className = "iprofiler-halo";
  halo.style.left = x + "px";
  halo.style.top = y + "px";
  halo.innerHTML = `<span class="iprofiler-core"></span>`;

  layer.appendChild(halo);
  document.body.appendChild(layer);

  clearTimeout(target.__burstTimer);
  target.__burstTimer = setTimeout(() => {
    if(typeof done === "function") done();
  }, 150);

  setTimeout(() => {
    if(layer && layer.parentNode) layer.remove();
  }, 2150);
}

function basePrice(){
  const p = selectedProduct();
  if(p.priceMode === "matrix"){
    const table = state.options.photo ? p.photoFusionPrices : p.prices;
    return table[state.coating][state.index];
  }
  return p.indices[state.index] || p.from;
}

function photoPrice(){
  const p = selectedProduct();
  if(!p) return null;
  return 500;
}


function lightConfiguredBasePrice(p){
  if(!p || p.priceMode !== "matrix" || p.series !== "light") return basePrice();
  const table = p.prices || {};
  return table[p.defaultCoating]?.[state.index] ?? basePrice();
}

function lightCoatingUpgradePrice(p){
  if(!p || p.priceMode !== "matrix" || p.series !== "light") return 0;
  const table = p.prices || {};
  const base = table[p.defaultCoating]?.[state.index];
  const selected = table[state.coating]?.[state.index];
  if(base == null || selected == null) return 0;
  return selected - base;
}

function lightCoatingSummaryText(p){
  const diff = lightCoatingUpgradePrice(p);
  if(diff === 0) return "Included";
  return "+RM" + Number(diff).toLocaleString("en-MY");
}


function total(){
  const p = selectedProduct();

  // Light Series is shown as itemised pricing:
  // configured base lens + coating upgrade + optional enhancements.
  if(p.priceMode === "matrix" && p.series === "light"){
    let t = lightConfiguredBasePrice(p);
    t += lightCoatingUpgradePrice(p);
    if(state.options.iscription) t += optionCharge("iscription", 100);
    if(state.options.photo) t += optionCharge("photo", photoPrice());
    return t;
  }

  // SmartLife / ClearMind matrix pricing already includes the selected coating in the table.
  let t = basePrice();
  if(p.priceMode === "matrix"){
    if(state.options.iscription) t += optionCharge("iscription", 100);

function selectIndex(idx){
  const oldIndex = state.index;
  const oldAvailable = availablePhotoFusionColours(oldIndex).map(c => c.key).join("|");
  const newAvailable = availablePhotoFusionColours(idx).map(c => c.key).join("|");
  const availabilityChanged = oldAvailable !== newAvailable;

  state.index = idx;

  const invalidCleared = validatePhotoFusionColourForIndex();

  if(state.options.photo && availabilityChanged){
    // Re-open the picker whenever the available colour set changes.
    // 1.67 → 1.74: shows only Grey / Extra Grey / Black / Brown.
    // 1.74 → 1.67: shows the full colour set again.
    photoColourOpen = true;
    summaryPhotoColourOpen = false;

    if(!invalidCleared && typeof showBuildToast === "function"){
      showBuildToast("PhotoFusion X colours updated for " + idx + ".");
    }
  }

  calmDetailUpdate();

  if(state.options.photo && availabilityChanged && state.screen === "detail"){
    renderDetail();
  }

function selectGoldCoating(value){

function toggleOption(id){

function setRowSelected(row, selected, square=false){
  if(!row) return;
  row.classList.toggle("selected", !!selected);
  const marker = row.firstElementChild;
  if(marker){
    marker.outerHTML = rowMark(!!selected, square);
  }
}

function setRowPrice(row, value){
  if(!row) return;
  const price = row.querySelector(".row-price");
  if(!price) return;
  if(price.innerHTML === value) return;
  price.classList.add("updating");
  setTimeout(() => {
    price.innerHTML = value;
    price.classList.remove("updating");
  }, 90);
}

function calmDetailUpdate(){
  validatePhotoFusionColourForIndex();
  if(state.screen !== "detail"){
    renderDetail();
    return;
  }

  const p = selectedProduct();
  if(!p){
    renderDetail();
    return;
  }

  // Coating rows
  document.querySelectorAll('[data-control="coating"]').forEach(row => {
    const key = row.dataset.key;
    setRowSelected(row, state.coating === key);
    setRowPrice(row, coatingPriceText(p, key));
  });

  document.querySelectorAll('[data-control="goldCoating"]').forEach(row => {
    const key = row.dataset.key;
    const selected = key === "gold" ? !!state.options.goldCoating : !state.options.goldCoating;
    setRowSelected(row, selected);
    setRowPrice(row, key === "gold" ? "+RM200" : (state.options.goldCoating ? "RM0" : "Included"));
  });

  // Index rows
  const idxObj = p.priceMode === "matrix"
    ? ((state.options.photo ? p.photoFusionPrices : p.prices)[state.coating] || {})
    : p.indices;

  document.querySelectorAll('[data-control="index"]').forEach(row => {
    const idx = row.dataset.key;
    setRowSelected(row, state.index === idx);
    const price = idxObj[idx];
    setRowPrice(row, price == null ? "—" : money(price));
  });

  // Options rows
  document.querySelectorAll('[data-control="option"]').forEach(row => {
    const key = row.dataset.key;
    setRowSelected(row, !!state.options[key], true);
    if(key === "photo"){
      const name = row.querySelector(".row-name");
      if(name) name.textContent = photoFusionName();
      row.classList.toggle("complimentary-active", isComplimentaryOption("photo"));
      setRowPrice(row, optionPriceHtml("photo", photoFusionUpgradeText(p)));
    }
    if(key === "iscription"){
      row.classList.toggle("complimentary-active", isComplimentaryOption("iscription"));
      setRowPrice(row, optionPriceHtml("iscription", "+RM100"));
    }
  });

  // Let the selected row settle first, then animate only the sticky price.
  clearTimeout(window.__calmTotalTimer);
  window.__calmTotalTimer = setTimeout(() => {
    renderStickyFooter();
  }, 140);
}

function labelCategoryText(){
  const map = {

    sv: "Single Vision",

  };
  return map[state.category] || "Lens";
}

function labelTypeFamilyText(p){
  if(!p) return labelCategoryText();
  const name = String(p.name || "");

  // Light 2 uses its own exact design codes. Preserve them exactly in print.
  if(p.series === "light"){
    if(/Progressive\s+3Dv/i.test(name) || /\b3Dv\b/.test(name)) return "Progressive 3Dv";
    if(/Progressive\s+3D/i.test(name) || /\b3D\b/i.test(name) && state.category === "progressive") return "Progressive 3D";
    if(/Progressive\s+D\b/i.test(name) || /\bD\b/.test(name) && state.category === "progressive") return "Progressive D";
    if(/Digital\s+3D/i.test(name) || /\b3D\b/i.test(name) && state.category === "digital") return "Digital 3D";
  }

  let tier = "";
  if(/Individual\s*3/i.test(name)) tier = "Individual 3";
  else if(/Individual/i.test(name)) tier = "Individual";
  else if(/Superb/i.test(name)) tier = "Superb";
  else if(/Plus/i.test(name)) tier = "Plus";
  else if(/Pure/i.test(name)) tier = "Pure";
  const typeMap = {progressive:"Progressive",digital:"Digital",single:"SV",sv:"SV",young:"Young SV"};
  const type = typeMap[state.category] || labelCategoryText();
  return [type,tier].filter(Boolean).join(" ");
}

function labelFamilyText(p){
  if(!p) return "";
  if(p.series === "smartlife") return "SmartLife PRO";
  if(p.series === "clearmind") return "ClearMind PRO";
  if(p.series === "light") return "Light 2";
  let name = (p.name || "").replace(/^ZEISS\s+/i, "");
  name = name.replace(/\b(Progressive|Single Vision|Digital Lens|Digital|Young|PRO)\b/gi, "").replace(/\s+/g, " ").trim();
  return name || (p.name || "");
}

/* RC20 Native Bluetooth TSPL print module for D520BT-Z via Bluefy/WebBLE */
let labelPrinterDevice = null;
const D520_SERVICE_UUID = "0000ff00-0000-1000-8000-00805f9b34fb";
const D520_WRITE_UUID   = "0000ff02-0000-1000-8000-00805f9b34fb";
const D520_NOTIFY_UUID  = "0000ff03-0000-1000-8000-00805f9b34fb";

function labelToast(msg){
  if(typeof showBuildToast === "function") showBuildToast(msg);
  else console.log(msg);
}

function sleep(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }

function d520Ascii(bytes){
  return Array.from(bytes).map(b => {
    if(b === 13) return "\\r";
    if(b === 10) return "\\n";
    if(b >= 32 && b <= 126) return String.fromCharCode(b);
    return ".";
  }).join("");
}

function d520Hex(bytes){
  return Array.from(bytes).map(b => b.toString(16).padStart(2,"0")).join(" ").toUpperCase();
}

function tsplSafeText(value){
  return String(value == null ? "" : value)
    .replace(/<[^>]*>/g, "")
    .replace(/&nbsp;/g, " ")
    .replace(/&amp;/g, "&")
    .replace(/&lt;/g, "<")
    .replace(/&gt;/g, ">")
    .replace(/[“”]/g, '"')
    .replace(/"/g, "'")
    .replace(/\s+/g, " ")
    .trim();
}

function labelMoneyPlain(n){
  const val = Math.round(Number(n) || 0);
  return "RM " + String(val);
}

function labelPriceLineTspl(label, amount){
  const price = labelMoneyPlain(amount);
  const PRICE_LINE_WIDTH = 24;
  const left = String(label || "");
  return left + " ".repeat(Math.max(1, PRICE_LINE_WIDTH - left.length - price.length)) + price;
}

function tsplLabelSpecLines(){
  const p = selectedProduct();
  const lines = [];
  const hasFrame = framePrice !== null && Number(framePrice) > 0;

  lines.push("ZEISS");
  lines.push("----------------------------");
  lines.push(labelCategoryText());
  lines.push(labelFamilyIndexText(p));
  lines.push(labelCoatingText(p));
  if(state.options && state.options.photo) lines.push(photoFusionName());
  if(state.options && state.options.iscription) lines.push("i.Scription");
  lines.push("----------------------------");

  if(hasFrame){
    lines.push(labelPriceLineTspl("Lens Price", total()));
    lines.push(labelPriceLineTspl("Frame Price", Number(framePrice)));
    lines.push("----------------------------");
    lines.push(labelPriceLineTspl("Total", summaryGrandTotal()));
  }else{
    lines.push(labelPriceLineTspl("Lens Price", total()));
  }

  return lines.map(tsplSafeText).filter(Boolean);
}

function buildLensSummaryTSPL(){
  const p = selectedProduct();
  const hasFrame = framePrice !== null && Number(framePrice) > 0;
  const cmd = [];
  cmd.push("SIZE 40 mm,60 mm");
  cmd.push("GAP 2 mm,0 mm");
  cmd.push("DIRECTION 1");
  cmd.push("REFERENCE 0,0");
  cmd.push("CLS");

  const font = "TSS24.BF2";
  const x = 24;
  const rmX = 190;
  const valueRightX = 306;
  const charW = 12;
  const gap = 34;
  let y = 18;

  const text = (line) => {
    const safe = tsplSafeText(line);
    if(!safe) return;
    cmd.push('TEXT ' + x + ',' + y + ',"' + font + '",0,1,1,"' + safe + '"');
    y += gap;
  };
  const rule = () => {
    // Native TSPL horizontal rule. Same width every time; no dash spacing variance.
    cmd.push('BAR ' + x + ',' + (y + 9) + ',300,2');
    y += gap;
  };
  const priceRow = (label, amount) => {
    const value = "RM " + String(Math.round(Number(amount) || 0));
    const valueX = Math.max(rmX, valueRightX - (value.length * charW));
    cmd.push('TEXT ' + x + ',' + y + ',"' + font + '",0,1,1,"' + tsplSafeText(label) + '"');
    cmd.push('TEXT ' + valueX + ',' + y + ',"' + font + '",0,1,1,"' + tsplSafeText(value) + '"');
    y += gap;
  };

  text("ZEISS");
  text(labelFamilyText(p));
  rule();
  text(labelTypeFamilyIndexText(p));
  text(labelCoatingText(p));
  text(state.options && state.options.photo ? photoFusionName() : "Clear");
  if(state.options && state.options.iscription) text("i.Scription");
  rule();

  if(hasFrame){
    priceRow("Lens Price", total());
    priceRow("Frame Price", Number(framePrice));
    rule();
    priceRow("Total", summaryGrandTotal());
  }else{
    priceRow("Lens Price", total());
  }

  cmd.push("PRINT 1,1");
  cmd.push("");
  return cmd.join("\r\n");
}

async function d520GetPrinterChannels(){
  if(!navigator.bluetooth){
    throw new Error("Web Bluetooth not available. Open this app in Bluefy/WebBLE on iPad.");
  }

  // Always request fresh connection for printing. D520 may drop idle BLE sessions.
  labelPrinterDevice = await navigator.bluetooth.requestDevice({
    filters: [
      { namePrefix: "D520" },
      { namePrefix: "D520BT" },
      { namePrefix: "D520BT-Z" },
      { namePrefix: "D" }
    ],
    optionalServices: [D520_SERVICE_UUID]
  });

  const server = await labelPrinterDevice.gatt.connect();
  const service = await server.getPrimaryService(D520_SERVICE_UUID);
  const writeCharacteristic = await service.getCharacteristic(D520_WRITE_UUID);

  let notifyCharacteristic = null;
  try{
    notifyCharacteristic = await service.getCharacteristic(D520_NOTIFY_UUID);
    notifyCharacteristic.addEventListener("characteristicvaluechanged", function(ev){
      const bytes = new Uint8Array(ev.target.value.buffer);
      console.log("D520 RX ASCII:", d520Ascii(bytes));
      console.log("D520 RX HEX:", d520Hex(bytes));
    });
    await notifyCharacteristic.startNotifications();
  }catch(e){
    console.warn("D520 FF03 notify unavailable:", e);
  }

  return { writeCharacteristic, notifyCharacteristic };
}

async function d520WriteChunks(characteristic, text){
  const bytes = new TextEncoder().encode(text);
  const chunkSize = 20;
  for(let i = 0; i < bytes.length; i += chunkSize){
    const chunk = bytes.slice(i, i + chunkSize);
    if(characteristic.properties.writeWithoutResponse && characteristic.writeValueWithoutResponse){
      await characteristic.writeValueWithoutResponse(chunk);
    } else {
      await characteristic.writeValue(chunk);
    }
    await sleep(35);
  }
}

async function printLensSummary(){
  try{
    labelToast("Connecting printer...");
    const channels = await d520GetPrinterChannels();

    const tspl = buildLensSummaryTSPL();
    console.log("D520 TSPL LABEL:\\n" + tspl);

    labelToast("Sending label...");
    await d520WriteChunks(channels.writeCharacteristic, tspl);

    // Give printer time to parse and respond before disconnecting.
    await sleep(1000);

    if(labelPrinterDevice && labelPrinterDevice.gatt && labelPrinterDevice.gatt.connected){
      labelPrinterDevice.gatt.disconnect();
    }

    labelToast("✓ Label sent to D520BT-Z");
  }catch(err){
    const message = err && err.message ? err.message : String(err);
    alert("Bluetooth print failed: " + message);
    console.error(err);
  }
}

function goBack(){

  if(state.screen === "categories"){ renderHome(); return; }
}


/* RC24.15 ClearMind sub-hero NeuroOptix slides - sub-level hero only */
const CLEARMIND_SUBHERO_SLIDES = ["assets/images/1a6bf96ad182ec13.jpg", "assets/images/3212b638e4c3f0a7.jpg", "assets/images/70957bc8c009b891.jpg", "assets/images/57c5fb53ccc1efe7.jpg", "assets/images/6566287f8f85f236.jpg", "assets/images/028ffaa0d6bf7f62.jpg", "assets/images/f85f1ed90a82c36c.jpg", "assets/images/02e7f714d5b97b71.jpg", "assets/images/5d139b3435b5fe2e.jpg", "assets/images/c8749545ff00ff77.jpg", "assets/images/d291dffdce440644.jpg"];
let clearMindSubHeroSlideIndex = 0;

function ensureClearMindSubHeroSlideOverlay(){
  let overlay = document.getElementById("cmSubHeroSlideOverlay");
  if(overlay) return overlay;
  overlay = document.createElement("div");
  overlay.id = "cmSubHeroSlideOverlay";
  overlay.className = "cm-subhero-slide-overlay";
  overlay.innerHTML = `
    <div class="cm-subhero-slide-shell" onclick="event.stopPropagation()">
      <button class="cm-subhero-slide-close" onclick="closeClearMindSubHeroSlides(event)">×</button>
      <button class="cm-subhero-slide-nav cm-subhero-slide-prev" onclick="changeClearMindSubHeroSlide(event,-1)">‹</button>
      <img id="cmSubHeroSlideImg" class="cm-subhero-slide-img" draggable="false" alt="ZEISS NeuroOptix slide">
      <button class="cm-subhero-slide-nav cm-subhero-slide-next" onclick="changeClearMindSubHeroSlide(event,1)">›</button>
      <div id="cmSubHeroSlideCount" class="cm-subhero-slide-count"></div>
    </div>`;
  overlay.addEventListener("click", closeClearMindSubHeroSlides);
  document.body.appendChild(overlay);
  return overlay;
}

function renderClearMindSubHeroSlide(){
  const img = document.getElementById("cmSubHeroSlideImg");
  const count = document.getElementById("cmSubHeroSlideCount");
  if(!img || !count) return;
  img.src = CLEARMIND_SUBHERO_SLIDES[clearMindSubHeroSlideIndex];
  count.textContent = `${clearMindSubHeroSlideIndex + 1} / ${CLEARMIND_SUBHERO_SLIDES.length}`;
}

function openClearMindSubHeroSlides(event){
  if(event){ event.preventDefault(); event.stopPropagation(); }
  const overlay = ensureClearMindSubHeroSlideOverlay();
  clearMindSubHeroSlideIndex = 0;
  renderClearMindSubHeroSlide();
  overlay.classList.add("show");
}

function closeClearMindSubHeroSlides(event){
  if(event){ event.preventDefault(); event.stopPropagation(); }
  const overlay = document.getElementById("cmSubHeroSlideOverlay");
  if(overlay) overlay.classList.remove("show");
}

function changeClearMindSubHeroSlide(event, direction){
  if(event){ event.preventDefault(); event.stopPropagation(); }
  const total = CLEARMIND_SUBHERO_SLIDES.length;
  clearMindSubHeroSlideIndex = (clearMindSubHeroSlideIndex + direction + total) % total;
  renderClearMindSubHeroSlide();
}

document.addEventListener("keydown", function(event){
  const overlay = document.getElementById("cmSubHeroSlideOverlay");
  if(!overlay || !overlay.classList.contains("show")) return;
  if(event.key === "Escape") closeClearMindSubHeroSlides(event);
  if(event.key === "ArrowLeft") changeClearMindSubHeroSlide(event, -1);
  if(event.key === "ArrowRight") changeClearMindSubHeroSlide(event, 1);
});

renderHome();
</script>

<script>
/* RC24.17 i.Scription demo launcher: replaces old chat bubble. */
(function(){
(function(){
const dataMap={
night:{unopt:"assets/images/e3fc76814c0ac038.png",opt:"assets/images/fe918b2fb70ba36f.png"},
colour:{unopt:"assets/images/ac5d06a7494a14b3.png",opt:"assets/images/064c935121d36df1.png"},
contrast:{unopt:"assets/images/de377901b7c4658e.png",opt:"assets/images/9acdd6be981412c7.png"}
};
const unopt=document.getElementById("isc-unopt"),opt=document.getElementById("isc-opt"),playBtn=document.getElementById("isc-play"),labelOriginal=document.getElementById("isc-label-original"),labelOptimised=document.getElementById("isc-label-optimised");
let progress=0,raf=null,playing=false; const duration=3600;
function render(){const pct=Math.max(0,Math.min(100,progress)),t=pct/100;unopt.style.opacity=String(1-t);opt.style.opacity=String(t);if(labelOriginal)labelOriginal.style.opacity=String(1-t);if(labelOptimised)labelOptimised.style.opacity=String(t);playBtn.textContent=playing?"Ⅱ":"▶";}
function stop(){if(raf)cancelAnimationFrame(raf);raf=null;playing=false;}
function reset(){stop();progress=0;render();}
function play(){
  stop();
  if(progress>=100) return;
  const startProgress=progress;
  const start=performance.now();
  const forwardDuration=3600;
  playing=true;
  function ease(x){return x<.5?2*x*x:1-Math.pow(-2*x+2,2)/2}
  function step(now){
    const local=Math.min(1,(now-start)/forwardDuration);
    progress=startProgress+(100-startProgress)*ease(local);
    render();
    if(local<1){
      raf=requestAnimationFrame(step);
    }else{
      progress=100;
      playing=false;
      raf=null;
      render();
    }
  }
  raf=requestAnimationFrame(step);
}
function switchMode(mode){reset();unopt.src=dataMap[mode].unopt;opt.src=dataMap[mode].opt;document.querySelectorAll(".isc-tab").forEach(btn=>btn.classList.toggle("active",btn.dataset.mode===mode));}
document.querySelectorAll(".isc-tab").forEach(btn=>btn.addEventListener("click",e=>{e.preventDefault();switchMode(btn.dataset.mode)}));
playBtn.addEventListener("click",e=>{e.preventDefault();if(!playing)play();});
window.iscResetEmbeddedDemo = reset;
render();
})();
  let iscDemoPage = 0;
  let iscTouchStartX = 0;
  let iscTouchStartY = 0;

  window.setIscriptionDemoPage = function(page){
    iscDemoPage = page === 1 ? 1 : 0;
    const track = document.getElementById('iscriptionDemoTrack');
    if(track) track.style.transform = iscDemoPage === 1 ? 'translateX(-50%)' : 'translateX(0)';
    const d0 = document.getElementById('iscDemoDot0');
    const d1 = document.getElementById('iscDemoDot1');
    if(d0) d0.classList.toggle('active', iscDemoPage === 0);
    if(d1) d1.classList.toggle('active', iscDemoPage === 1);
  };

  window.openIscriptionDemo = function(event){
    if(event){ event.preventDefault(); event.stopPropagation(); }
    document.querySelectorAll('.pro-popover.show,.iscription-popover.show,.pro-popover.revealing,.iscription-popover.revealing').forEach(p => {
      p.classList.remove('show');
      p.classList.remove('revealing');
    });
    const modal = document.getElementById('iscriptionDemoModal');
    if(modal){
      modal.classList.add('show');
      modal.setAttribute('aria-hidden','false');
    }
    window.setIscriptionDemoPage(0);
    if(typeof window.iscResetEmbeddedDemo === 'function') window.iscResetEmbeddedDemo();
  };

  window.closeIscriptionDemo = function(event){
    if(event){ event.preventDefault(); event.stopPropagation(); }
    const modal = document.getElementById('iscriptionDemoModal');
    if(modal){
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden','true');
    }
  };

  const vp = document.getElementById('iscriptionDemoViewport');
  function iscStartSwipe(x, y){
    iscTouchStartX = x;
    iscTouchStartY = y;
  }
  function iscEndSwipe(x, y){
    const dx = x - iscTouchStartX;
    const dy = y - iscTouchStartY;
    if(Math.abs(dx) > 35 && Math.abs(dx) > Math.abs(dy) * 1.05){
      if(dx < 0) window.setIscriptionDemoPage(1);
      else window.setIscriptionDemoPage(0);
    }
  }
  if(vp){
    vp.addEventListener('touchstart', function(e){
      if(!e.touches || !e.touches.length) return;
      iscStartSwipe(e.touches[0].clientX, e.touches[0].clientY);
    }, {passive:true});
    vp.addEventListener('touchend', function(e){
      if(!e.changedTouches || !e.changedTouches.length) return;
      iscEndSwipe(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }, {passive:true});

    let iscPointerDown = false;
    vp.addEventListener('pointerdown', function(e){
      iscPointerDown = true;
      iscStartSwipe(e.clientX, e.clientY);
    });
    vp.addEventListener('pointerup', function(e){
      if(!iscPointerDown) return;
      iscPointerDown = false;
      iscEndSwipe(e.clientX, e.clientY);
    });
  }

  window.addEventListener('keydown', function(e){
    const modal = document.getElementById('iscriptionDemoModal');
    if(!modal || !modal.classList.contains('show')) return;
    if(e.key === 'Escape') closeIscriptionDemo(e);
    if(e.key === 'ArrowLeft') window.setIscriptionDemoPage(0);
    if(e.key === 'ArrowRight') window.setIscriptionDemoPage(1);
  });
})();
</script>
